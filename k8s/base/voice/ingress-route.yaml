apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: aios-voice
  namespace: aios
  labels:
    app.kubernetes.io/name: aios-voice
    app.kubernetes.io/part-of: aios
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`voice.lab.kazie.co.uk`)
      kind: Rule
      services:
        - name: aios-voice
          port: 80
  tls:
    certResolver: cloudflare
