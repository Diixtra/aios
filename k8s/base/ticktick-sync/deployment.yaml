apiVersion: apps/v1
kind: Deployment
metadata:
  name: aios-ticktick-sync
  namespace: aios
  labels:
    app.kubernetes.io/name: aios-ticktick-sync
    app.kubernetes.io/part-of: aios
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aios-ticktick-sync
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aios-ticktick-sync
        app.kubernetes.io/part-of: aios
    spec:
      serviceAccountName: aios-ticktick-sync
      containers:
        - name: ticktick-sync
          image: ghcr.io/diixtra/aios-ticktick-sync:latest
          env:
            - name: TICKTICK_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: aios-ticktick-oauth
                  key: access-token
            - name: TICKTICK_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: aios-ticktick-oauth
                  key: client-id
            - name: TICKTICK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: aios-ticktick-oauth
                  key: client-secret
            - name: TICKTICK_REFRESH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: aios-ticktick-oauth
                  key: refresh-token
            - name: TICKTICK_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: aios-ticktick-oauth
                  key: project-id
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: aios-github-app
                  key: token
            - name: GITHUB_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: aios-github-app
                  key: webhook-secret
            - name: GITHUB_REPOS
              value: "Diixtra/aios,Diixtra/kompare-ng"
            - name: POLL_INTERVAL
              value: "2m"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
