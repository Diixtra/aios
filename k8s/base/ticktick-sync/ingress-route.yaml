apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: aios-ticktick-sync
  namespace: aios
  labels:
    app.kubernetes.io/name: aios-ticktick-sync
    app.kubernetes.io/part-of: aios
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`aios-ticktick-sync.lab.kazie.co.uk`)
      kind: Rule
      services:
        - name: aios-ticktick-sync
          port: 8080
  tls:
    certResolver: cloudflare
