apiVersion: apps/v1
kind: Deployment
metadata:
  name: aios-operator
  namespace: aios
  labels:
    app.kubernetes.io/name: aios-operator
    app.kubernetes.io/part-of: aios
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aios-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aios-operator
        app.kubernetes.io/part-of: aios
    spec:
      serviceAccountName: aios-operator
      automountServiceAccountToken: true
      containers:
        - name: operator
          image: ghcr.io/diixtra/aios-operator:latest
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
