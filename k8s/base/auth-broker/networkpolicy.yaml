apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: auth-broker
  namespace: aios
spec:
  endpointSelector:
    matchLabels:
      app: auth-broker
  ingress:
    # Operator, webhook, and runtime Jobs may call the broker.
    - fromEndpoints:
        - matchLabels:
            app: operator
        - matchLabels:
            app: webhook
        - matchLabels:
            app: runtime
      toPorts:
        - ports:
            - { port: "8080", protocol: TCP }
  egress:
    # Egress to OpenAI Codex (subscription) and Slack only.
    - toFQDNs:
        - matchPattern: "*.openai.com"
        - matchPattern: "*.slack.com"
      toPorts:
        - ports:
            - { port: "443", protocol: TCP }
    # DNS lookup.
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
            "k8s:k8s-app": kube-dns
      toPorts:
        - ports:
            - { port: "53", protocol: UDP }
          rules:
            dns:
              - matchPattern: "*"
    # Kubernetes API for TokenReview.
    - toEntities:
        - kube-apiserver
