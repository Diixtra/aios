apiVersion: apps/v1
kind: Deployment
metadata:
  name: aios-webhook
  namespace: aios
  labels:
    app.kubernetes.io/name: aios-webhook
    app.kubernetes.io/part-of: aios
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aios-webhook
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aios-webhook
        app.kubernetes.io/part-of: aios
    spec:
      serviceAccountName: aios-webhook
      containers:
        - name: webhook
          image: ghcr.io/diixtra/aios-webhook:latest
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: GITHUB_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: aios-github-app
                  key: webhook-secret
            - name: PAPERLESS_API_URL
              value: "http://paperless-paperless-ngx.paperless.svc:8000"
            - name: PAPERLESS_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: aios-paperless-api
                  key: api-token
            - name: PAPERLESS_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: aios-paperless-api
                  key: webhook-secret
            - name: PAPERLESS_DOMAIN
              value: "https://paperless.lab.kazie.co.uk"
            - name: LOCALAI_URL
              value: "http://local-ai.local-ai.svc:8080"
            - name: LOCALAI_MODEL
              value: "phi-3-mini"
            - name: VAULT_PATH
              value: "/vault"
            - name: AIOS_SEARCH_URL
              value: "http://aios-search.aios.svc:8080"
          volumeMounts:
            - name: vault
              mountPath: /vault
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
      volumes:
        - name: vault
          hostPath:
            path: /mnt/syncthing/obsidian-vault
            type: Directory
