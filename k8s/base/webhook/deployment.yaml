apiVersion: apps/v1
kind: Deployment
metadata:
  name: aios-webhook
  namespace: aios
  labels:
    app.kubernetes.io/name: aios-webhook
    app.kubernetes.io/part-of: aios
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aios-webhook
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aios-webhook
        app.kubernetes.io/part-of: aios
    spec:
      automountServiceAccountToken: false
      containers:
        - name: webhook
          image: ghcr.io/diixtra/aios-webhook:latest
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: GITHUB_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: aios-github-app
                  key: webhook-secret
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
