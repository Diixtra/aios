name: Build ticktick-sync

on:
  push:
    branches: [main]
    paths:
      - "ticktick-sync/**"
  pull_request:
    paths:
      - "ticktick-sync/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache-dependency-path: ticktick-sync/go.sum
      - name: Test
        working-directory: ticktick-sync
        run: go test ./... -v -race -cover

  build:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ticktick-sync
          push: true
          tags: ghcr.io/diixtra/aios-ticktick-sync:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
