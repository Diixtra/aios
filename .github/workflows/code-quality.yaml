name: Code Quality

on:
  pull_request: {}
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read
  security-events: write

concurrency:
  group: code-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  code-quality:
    uses: Diixtra/diixtra-forge/.github/workflows/code-quality.yaml@main
    with:
      mode: enforce
