name: "aios-search: Test"

on:
  pull_request:
    paths:
      - "aios-search/**"
      - ".github/workflows/aios-search-test.yaml"
  push:
    branches: [main]
    paths:
      - "aios-search/**"
      - ".github/workflows/aios-search-test.yaml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aios-search
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Pre-pull pgvector image (warm cache)
        run: docker pull pgvector/pgvector:pg18

      - name: Create venv + install
        run: |
          uv venv --python 3.14
          uv pip install -e '.[dev]'

      - name: Run tests
        run: uv run pytest tests/ -v --cov=src/aios_search --cov-report=term-missing
