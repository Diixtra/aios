name: "aios-search: Build & Push Image"

on:
  push:
    branches: [main]
    paths:
      - "aios-search/**"
      - ".github/workflows/aios-search-build.yaml"

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: aios-search
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/diixtra/aios/aios-search:latest
            ghcr.io/diixtra/aios/aios-search:build-${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
