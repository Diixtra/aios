---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - aios.kazie.co.uk
  resources:
  - agentconfigs
  - toolpolicies
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - aios.kazie.co.uk
  resources:
  - agenttasks
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - aios.kazie.co.uk
  resources:
  - agenttasks/finalizers
  verbs:
  - update
- apiGroups:
  - aios.kazie.co.uk
  resources:
  - agenttasks/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - batch
  resources:
  - jobs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
