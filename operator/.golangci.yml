version: "2"

run:
  timeout: 5m
  allow-parallel-runners: true

linters:
  default: none
  enable:
    - copyloopvar
    - dupl
    - errcheck
    - ginkgolinter
    - goconst
    - gocyclo
    - govet
    - ineffassign
    - lll
    - misspell
    - nakedret
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
  exclusions:
    rules:
      - path: "api/*"
        linters:
          - lll
      - path: "internal/*"
        linters:
          - dupl
          - lll
      # Test files use idiomatic patterns that trigger style linters benignly:
      # repeated string literals as test data, unchecked errors on cleanup helpers,
      # ineffectual assignments in mock setup, slice prealloc on small fixtures.
      - path: "_test\\.go"
        linters:
          - goconst
          - errcheck
          - ineffassign
          - prealloc
  settings:
    revive:
      rules:
        - name: comment-spacings

formatters:
  enable:
    - gofmt
    - goimports
