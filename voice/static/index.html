<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIOS Voice Gateway</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f0f0f;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }
        h1 {
            font-size: 1.4rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: #a0a0a0;
        }
        #task-name {
            font-size: 1.1rem;
            color: #6a9ff8;
            margin-bottom: 2rem;
        }
        #push-btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #333;
            background: #1a1a2e;
            color: #6a9ff8;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2rem;
        }
        #push-btn:hover { border-color: #6a9ff8; }
        #push-btn.recording {
            background: #2a1a1a;
            border-color: #f86a6a;
            color: #f86a6a;
            box-shadow: 0 0 30px rgba(248, 106, 106, 0.3);
        }
        #status {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 2rem;
        }
        #transcript {
            width: 100%;
            max-width: 600px;
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            background: #1a1a1a;
            border-radius: 8px;
            border: 1px solid #2a2a2a;
        }
        .msg {
            margin-bottom: 0.75rem;
            padding: 0.6rem 0.8rem;
            border-radius: 6px;
            font-size: 0.9rem;
            line-height: 1.4;
        }
        .msg.user { background: #1a2a3a; color: #8ab4f8; }
        .msg.agent { background: #1a2a1a; color: #8af8a0; }
        .msg .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            opacity: 0.6;
            margin-bottom: 0.2rem;
        }
    </style>
</head>
<body>
    <h1>AIOS Voice Gateway</h1>
    <div id="task-name">No task selected</div>
    <button id="push-btn">PUSH TO TALK</button>
    <div id="status">Connecting...</div>
    <div id="transcript"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const taskName = params.get('task') || 'default';
        document.getElementById('task-name').textContent = taskName;

        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        const ws = new WebSocket(`${protocol}//${location.host}/ws/${taskName}`);
        const btn = document.getElementById('push-btn');
        const status = document.getElementById('status');
        const transcript = document.getElementById('transcript');

        let mediaRecorder = null;
        let audioChunks = [];
        let audioCtx = null;

        ws.onopen = () => { status.textContent = 'Ready'; };
        ws.onclose = () => { status.textContent = 'Disconnected'; };
        ws.onerror = () => { status.textContent = 'Connection error'; };

        ws.onmessage = (event) => {
            if (typeof event.data === 'string') {
                const msg = JSON.parse(event.data);
                if (msg.type === 'transcript') {
                    addMessage('user', msg.user);
                    addMessage('agent', msg.agent);
                }
            } else {
                // Binary audio response - play it
                playAudio(event.data);
            }
        };

        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = `msg ${role}`;
            const label = document.createElement('div');
            label.className = 'label';
            label.textContent = role === 'user' ? 'You' : 'Agent';
            const body = document.createElement('div');
            body.textContent = text;
            div.appendChild(label);
            div.appendChild(body);
            transcript.appendChild(div);
            transcript.scrollTop = transcript.scrollHeight;
        }

        async function playAudio(blob) {
            if (!audioCtx) audioCtx = new AudioContext();
            const buffer = await blob.arrayBuffer();
            const audioBuffer = await audioCtx.decodeAudioData(buffer);
            const source = audioCtx.createBufferSource();
            source.buffer = audioBuffer;
            source.connect(audioCtx.destination);
            source.start();
        }

        async function startRecording() {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioChunks = [];
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) audioChunks.push(e.data);
            };
            mediaRecorder.start();
            btn.classList.add('recording');
            btn.textContent = 'RECORDING';
            status.textContent = 'Listening...';
        }

        function stopRecording() {
            if (!mediaRecorder || mediaRecorder.state === 'inactive') return;
            mediaRecorder.onstop = async () => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                const bytes = await blob.arrayBuffer();
                if (ws.readyState === WebSocket.OPEN) {
                    ws.send(bytes);
                    status.textContent = 'Processing...';
                }
                mediaRecorder.stream.getTracks().forEach(t => t.stop());
            };
            mediaRecorder.stop();
            btn.classList.remove('recording');
            btn.textContent = 'PUSH TO TALK';
        }

        btn.addEventListener('mousedown', startRecording);
        btn.addEventListener('mouseup', stopRecording);
        btn.addEventListener('mouseleave', stopRecording);
        btn.addEventListener('touchstart', (e) => { e.preventDefault(); startRecording(); });
        btn.addEventListener('touchend', (e) => { e.preventDefault(); stopRecording(); });
    </script>
</body>
</html>
